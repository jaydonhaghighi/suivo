name: CI

on:
  push:
    branches:
      - main
      - development
      - 'dev/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: suivo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/suivo
      REDIS_URL: redis://localhost:6379
      JWT_ISSUER: https://example-idp.com/
      JWT_AUDIENCE: suivo-api
      JWT_JWKS_URI: https://example-idp.com/.well-known/jwks.json

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Prepare env files
        run: |
          cp .env.example .env
          cp apps/mobile/.env.example apps/mobile/.env
          cp apps/web-admin/.env.example apps/web-admin/.env

      - name: Environment contract
        run: pnpm env:check

      - name: Run migrations
        run: pnpm db:migrate

      - name: Database doctor
        run: pnpm db:doctor

      - name: Typecheck
        run: pnpm typecheck

      # - name: Lint
      #   run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
